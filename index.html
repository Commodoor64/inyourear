<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Your Ear</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2/dist/htmx.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="info">
        <div class = "info-content">
            <p>Xandi Pink</p>
            <p>is in <span class = "highlight yellow">Italy</span></p>
            <p>where it is <span id = "xandi-time" class = "highlight blue">14:00</span></p>
            <p>Last seen <span id="xandi-presence">1 hour ago</span></p>
            
        </div>
        <div class = "info-content">
             
            <p>Allie Heffner</p>
            <p>is in <span class = "highlight red">New York </span></p>
            <p>where it is <span id = "allie-time" class = "highlight green">14:00</span></p>
            <p>Last seen <span id="allie-presence">1 hour ago</span></p>
            
        
        </div>
    </div>
    <div class="overlay hidden">
    <section id="composer" class = "form-container">
     
        <div class = "canvas-container">
        <canvas id="pad" width = 600 height = 400></canvas>
          <div class="controls">
            <label id="photo-label" for="photo" class="button">Choose photo</label>
            <input type="file" id="photo" accept="image/*" hidden>
            <button id = "red" class="button"><div class = "color"></div></button>
            <button id = "green" class="button"><div class = "color"></div></button>
            <button id = "blue" class="button"><div class = "color"></div></button>
            <button id = "orange" class="button"><div class = "color"></div></button>
            <button id = "magenta" class="button"><div class = "color"></div></button>
            <button id = "yellow" class="button"><div class = "color"></div></button>
            <button id = "black" class="button"><div class = "color"></div></button>
            <button id = "clear" class="button">Clear</button>
           
            
          </div>
          </div>
          <div class="text-container">
            <div class="message-container">
            <textarea id="message" placeholder="write something…" maxlength="1000"></textarea>
        <div class = "closers-container">
            <div class="dd" id="closers">
                    <button type="button" class="dd-toggle button">Love ▾</button>
                        <ul class="dd-menu" hidden>
                            <li class="red"     data-value="Love">Love</li>
                            <li class="blue"    data-value="I MISS YOU">I MISS YOU</li>
                            <li class="green"   data-value="AJIDLIUHWLIUHAJSLJJALKAHLS">AJIDLIUHWLIUHAJSLJJALKAHLS</li>
                            <li class="yellow"  data-value="AHHHH">AHHHH</li>
                            <li class="magenta" data-value="I Hate You">I Hate You</li>
                            <li class="orange"  data-value="Bruh">Bruh</li>
                        </ul>
                </div>
                <p id="author">Allie</p>
        </div>
    </div>
            <button id="send" type="button" class = "button">send -></button>
            
        </div>
    </section>
</div>
    
         <section id="grid"
         class="grid-container"
           hx-get="api/postcards.php"
           hx-trigger="load, every 15s, refresh"
           hx-swap="innerHTML">
 
    </section>
</body>
<script type="module" src="script.js"></script>

</html>
